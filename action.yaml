name: Load Secrets from Akeyless
description: Fetches secrets from Akeyless and exports them to GITHUB_ENV
inputs:
  access-id:
    description: Akeyless Access ID
    required: true
  access-key:
    description: Akeyless Access Key
    required: true
  secret-path:
    description: Path of the secret in Akeyless (must be a JSON key-value object)
    required: true
  output-file:
    description: Optional filename to write the secret to instead of exporting environment variables.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Authenticate with Akeyless
      shell: bash
      env:
        AKEYLESS_ACCESS_ID: ${{ inputs.access-id }}
        AKEYLESS_ACCESS_KEY: ${{ inputs.access-key }}
      run: |
        TOKEN=$(curl -sf -X POST "https://api.akeyless.io/auth" \
          -H "Content-Type: application/json" \
          -d "{
            \"access-id\": \"${AKEYLESS_ACCESS_ID}\",
            \"access-key\": \"${AKEYLESS_ACCESS_KEY}\",
            \"access-type\": \"api_key\"
          }" | jq -r '.token')

        if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
          echo "::error::Akeyless authentication failed"
          exit 1
        fi

        echo "::add-mask::$TOKEN"
        echo "AKEYLESS_TOKEN=$TOKEN" >> "$GITHUB_ENV"

    - name: Fetch and export secrets
      shell: bash
      env:
        SECRET_PATH: ${{ inputs.secret-path }}
        OUTPUT_FILE: ${{ inputs.output-file }}
      run: |
        SECRET_JSON=$(curl -sf -X POST "https://api.akeyless.io/get-secret-value" \
          -H "Content-Type: application/json" \
          -d "{
            \"names\": [\"${SECRET_PATH}\"],
            \"token\": \"${AKEYLESS_TOKEN}\"
          }" | jq -c -r --arg path "$SECRET_PATH" '.[$path]')

        if [ -z "$SECRET_JSON" ] || [ "$SECRET_JSON" = "null" ]; then
          echo "::error::Failed to fetch secret: ${SECRET_PATH}"
          exit 1
        fi

        echo "::add-mask::$SECRET_JSON"

        # Write the raw secret to a file if requested
        if [ -n "$OUTPUT_FILE" ]; then
          mkdir -p "$(dirname "$OUTPUT_FILE")"
          printf '%s' "$SECRET_JSON" > "$OUTPUT_FILE"
          chmod 600 "$OUTPUT_FILE"
          echo "Secret written to $OUTPUT_FILE"
          exit 0
        fi

        if ! echo "$SECRET_JSON" | jq -e 'type == "object"' >/dev/null 2>&1; then
          echo "::error::Secret at '${SECRET_PATH}' is not a JSON object. Only key-value secrets are supported unless output-file is used."
          exit 1
        fi

        for key in $(echo "$SECRET_JSON" | jq -r 'keys[]'); do
          value=$(echo "$SECRET_JSON" | jq -r --arg key "$key" '.[$key]')

          # Mask every line of the value (handles multiline secrets)
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$value"

          {
            echo "$key<<EOF"
            echo "$value"
            echo "EOF"
          } >> "$GITHUB_ENV"
        done

    - name: Cleanup
      shell: bash
      run: |
        echo "AKEYLESS_TOKEN=" >> "$GITHUB_ENV"
        echo "SECRET_JSON=" >> "$GITHUB_ENV"
        unset AKEYLESS_TOKEN
        unset SECRET_JSON
